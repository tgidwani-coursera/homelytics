<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Homelytics — RERA Project Transparency</title>
<style>
  :root {
    --bg: #f6f7f9;
    --surface: #ffffff;
    --ink: #1f2933;
    --ink-soft: #52606d;
    --ink-faint: #9aa5b1;
    --line: #e4e7eb;
    --accent: #2b6777;       /* calm teal — trust */
    --accent-soft: #e3eef1;
    --good: #2f855a;
    --good-soft: #e6f4ec;
    --warn: #b7791f;
    --warn-soft: #fbf3e2;
    --bad: #c0392b;
    --bad-soft: #fbe9e7;
    --radius: 12px;
    --shadow: 0 1px 3px rgba(31,41,51,.06), 0 1px 2px rgba(31,41,51,.04);
    --maxw: 1080px;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--ink);
    font: 15px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }
  .wrap { max-width: var(--maxw); margin: 0 auto; padding: 0 20px; }

  header.site {
    background: var(--surface); border-bottom: 1px solid var(--line);
    position: sticky; top: 0; z-index: 10;
  }
  header.site .wrap { display: flex; align-items: center; gap: 12px; padding: 16px 20px; }
  .logo { display: flex; align-items: baseline; gap: 8px; cursor: pointer; }
  .logo b { font-size: 20px; letter-spacing: -.3px; }
  .logo .dot { color: var(--accent); }
  .logo span { color: var(--ink-faint); font-size: 12px; }

  h1 { font-size: 24px; margin: 0 0 4px; letter-spacing: -.4px; }
  h2 { font-size: 16px; margin: 28px 0 12px; color: var(--ink); }
  .muted { color: var(--ink-soft); }
  .faint { color: var(--ink-faint); }

  /* stats banner */
  .stats { display: grid; grid-template-columns: repeat(4,1fr); gap: 14px; margin: 22px 0; }
  .stat { background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius);
          padding: 18px; box-shadow: var(--shadow); }
  .stat .n { font-size: 28px; font-weight: 700; letter-spacing: -.5px; }
  .stat .l { color: var(--ink-soft); font-size: 13px; margin-top: 2px; }

  /* controls */
  .controls { display: flex; flex-wrap: wrap; gap: 10px; margin: 8px 0 20px; }
  .controls input, .controls select {
    font: inherit; padding: 10px 12px; border: 1px solid var(--line); border-radius: 10px;
    background: var(--surface); color: var(--ink);
  }
  .controls input { flex: 1 1 240px; min-width: 180px; }
  .controls input:focus, .controls select:focus { outline: 2px solid var(--accent-soft); border-color: var(--accent); }

  /* project cards */
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px,1fr)); gap: 14px; }
  .card { background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius);
          padding: 16px; box-shadow: var(--shadow); display: flex; flex-direction: column; gap: 10px;
          transition: border-color .15s, transform .15s; }
  .card.click { cursor: pointer; }
  .card.click:hover { border-color: var(--accent); transform: translateY(-1px); }
  .card .title { font-weight: 600; font-size: 15px; line-height: 1.35; }
  .card .reg { font-size: 12px; color: var(--ink-faint); font-variant-numeric: tabular-nums; }
  .badges { display: flex; flex-wrap: wrap; gap: 6px; }
  .badge { font-size: 11px; padding: 3px 9px; border-radius: 999px; background: var(--accent-soft);
           color: var(--accent); font-weight: 600; }
  .badge.gray { background: #eef1f4; color: var(--ink-soft); }
  .badge.good { background: var(--good-soft); color: var(--good); }
  .badge.warn { background: var(--warn-soft); color: var(--warn); }
  .badge.bad  { background: var(--bad-soft); color: var(--bad); }
  .kv { font-size: 13px; color: var(--ink-soft); display: flex; justify-content: space-between; gap: 10px; }
  .kv b { color: var(--ink); font-weight: 600; }

  /* detail */
  .back { display: inline-block; margin: 18px 0 6px; font-size: 14px; }
  .panel { background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius);
           padding: 20px; box-shadow: var(--shadow); margin-bottom: 16px; }
  .facts { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px,1fr)); gap: 14px 24px; }
  .fact .l { font-size: 12px; color: var(--ink-faint); text-transform: uppercase; letter-spacing: .04em; }
  .fact .v { font-size: 15px; margin-top: 2px; }

  /* sold bar */
  .bar { height: 24px; border-radius: 8px; background: #eef1f4; overflow: hidden; display: flex; }
  .bar .seg { height: 100%; }
  .bar .sold { background: var(--good); }
  .bar .mort { background: var(--warn); }
  .bar .other { background: #cbd2d9; }
  .legend { display: flex; flex-wrap: wrap; gap: 14px; margin-top: 10px; font-size: 13px; color: var(--ink-soft); }
  .legend .sw { display: inline-block; width: 10px; height: 10px; border-radius: 3px; margin-right: 6px; vertical-align: middle; }

  /* checklist */
  .checklist { list-style: none; padding: 0; margin: 0; display: grid; gap: 8px; }
  .checklist li { display: flex; align-items: center; gap: 10px; font-size: 14px; }
  .mark { width: 20px; height: 20px; border-radius: 50%; flex: none; display: grid; place-items: center;
          font-size: 12px; font-weight: 700; color: #fff; }
  .mark.yes { background: var(--good); }
  .mark.no  { background: #cbd2d9; }
  .chips { display: flex; flex-wrap: wrap; gap: 8px; }
  .chip { font-size: 13px; padding: 6px 12px; border-radius: 999px; background: var(--accent-soft); color: var(--accent); }
  .chip.charged::after { content: " • charged"; color: var(--warn); font-size: 11px; }

  table { width: 100%; border-collapse: collapse; font-size: 14px; }
  th, td { text-align: left; padding: 9px 10px; border-bottom: 1px solid var(--line); }
  th { font-size: 12px; text-transform: uppercase; letter-spacing: .04em; color: var(--ink-faint); }
  td.num, th.num { text-align: right; font-variant-numeric: tabular-nums; }

  .empty { text-align: center; color: var(--ink-faint); padding: 40px 0; }
  .doclink { font-size: 13px; }
  footer { color: var(--ink-faint); font-size: 12px; text-align: center; padding: 30px 0; }
  .spinner { text-align:center; padding:50px 0; color: var(--ink-faint); }

  @media (max-width: 720px) {
    .stats { grid-template-columns: repeat(2,1fr); }
    h1 { font-size: 20px; }
  }
</style>
</head>
<body>
  <header class="site">
    <div class="wrap">
      <div class="logo" onclick="location.hash='#/'">
        <b>Homelytics<span class="dot">.</span></b>
        <span>RERA transparency for home buyers</span>
      </div>
    </div>
  </header>
  <main class="wrap" id="app"><div class="spinner">Loading…</div></main>
  <footer>Data sourced from Rajasthan RERA public disclosures · Homelytics</footer>

<script>
const app = document.getElementById("app");
const esc = (s) => (s == null ? "" : String(s).replace(/[&<>"']/g, c =>
  ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c])));
const fmtDate = (s) => s ? new Date(s).toLocaleDateString("en-IN", { day:"2-digit", month:"short", year:"numeric" }) : "—";
const num = (n) => (n == null ? "—" : Number(n).toLocaleString("en-IN"));

async function api(path) {
  const r = await fetch(path);
  if (!r.ok) throw new Error("HTTP " + r.status);
  return r.json();
}
const statusClass = (s) => {
  const t = (s || "").toLowerCase();
  if (t.includes("progress") || t.includes("approv")) return "good";
  if (t.includes("reject") || t.includes("lapsed") || t.includes("expire")) return "bad";
  return "gray";
};

/* ---------------- Home ---------------- */
let HOME_FILTERS = { district:"", type:"", status:"", search:"" };

async function renderHome() {
  app.innerHTML = `<div class="spinner">Loading…</div>`;
  const stats = await api("/api/stats");
  const f = stats.filters;
  const opt = (arr, sel) => `<option value="">All</option>` +
    arr.map(v => `<option value="${esc(v)}" ${v===sel?"selected":""}>${esc(v)}</option>`).join("");

  app.innerHTML = `
    <h1>Find a RERA-registered project</h1>
    <p class="muted">Explore registered real-estate projects, their builders, inventory and compliance documents — transparently.</p>
    <div class="stats">
      <div class="stat"><div class="n">${num(stats.total_projects)}</div><div class="l">Projects</div></div>
      <div class="stat"><div class="n">${num(stats.total_builders)}</div><div class="l">Builders</div></div>
      <div class="stat"><div class="n">${num(stats.districts_covered)}</div><div class="l">Districts covered</div></div>
      <div class="stat"><div class="n">${num(stats.total_complaints)}</div><div class="l">Complaints on record</div></div>
    </div>
    <div class="controls">
      <input id="q" type="search" placeholder="Search project, builder or registration no…" value="${esc(HOME_FILTERS.search)}">
      <select id="fd">${opt(f.districts, HOME_FILTERS.district)}</select>
      <select id="ft">${opt(f.types, HOME_FILTERS.type)}</select>
      <select id="fs">${opt(f.statuses, HOME_FILTERS.status)}</select>
    </div>
    <div id="results"><div class="spinner">Loading…</div></div>
  `;

  const q = document.getElementById("q");
  const fd = document.getElementById("fd"), ft = document.getElementById("ft"), fs = document.getElementById("fs");
  let timer;
  const apply = () => {
    HOME_FILTERS = { search:q.value.trim(), district:fd.value, type:ft.value, status:fs.value };
    loadProjects();
  };
  q.addEventListener("input", () => { clearTimeout(timer); timer = setTimeout(apply, 250); });
  [fd, ft, fs].forEach(el => el.addEventListener("change", apply));
  loadProjects();
}

async function loadProjects() {
  const box = document.getElementById("results");
  const p = new URLSearchParams();
  if (HOME_FILTERS.search) p.set("search", HOME_FILTERS.search);
  if (HOME_FILTERS.district) p.set("district", HOME_FILTERS.district);
  if (HOME_FILTERS.type) p.set("type", HOME_FILTERS.type);
  if (HOME_FILTERS.status) p.set("status", HOME_FILTERS.status);
  const rows = await api("/api/projects?" + p.toString());
  if (!rows.length) { box.innerHTML = `<div class="empty">No projects match your filters.</div>`; return; }
  box.innerHTML = `<p class="faint" style="margin:0 0 12px">${rows.length} project${rows.length>1?"s":""}</p>
    <div class="grid">` + rows.map(cardHTML).join("") + `</div>`;
}

function cardHTML(p) {
  const href = "#/project/" + p.registration_no;  // slashes kept; router handles
  return `<div class="card click" onclick="location.hash='${esc(href)}'">
    <div>
      <div class="title">${esc(p.project_name) || "Untitled project"}</div>
      <div class="reg">${esc(p.registration_no)}</div>
    </div>
    <div class="badges">
      ${p.district ? `<span class="badge">${esc(p.district)}</span>` : ""}
      ${p.project_type ? `<span class="badge gray">${esc(p.project_type)}</span>` : ""}
      ${p.status ? `<span class="badge ${statusClass(p.status)}">${esc(p.status)}</span>` : ""}
    </div>
    <div class="kv"><span>Builder</span><b>${esc(p.promoter_name) || "—"}</b></div>
    <div class="kv"><span>Registered</span><b>${fmtDate(p.date_of_registration)}</b></div>
    <div class="kv"><span>Est. completion</span><b>${fmtDate(p.expected_completion_date)}</b></div>
  </div>`;
}

/* ---------------- Trend chart (inline SVG, no deps) ---------------- */
function trendChartSVG(series) {
  // series: [{snapshot_date, total_units, units_booked, ...}] oldest->newest
  const W = 640, H = 200, pad = { l: 40, r: 16, t: 14, b: 28 };
  const iw = W - pad.l - pad.r, ih = H - pad.t - pad.b;
  const maxY = Math.max(1, ...series.map(d => d.total_units || 0));
  const n = series.length;
  const x = (i) => pad.l + (n === 1 ? iw / 2 : (iw * i) / (n - 1));
  const y = (v) => pad.t + ih - (ih * (v || 0)) / maxY;
  const gridVals = [0, Math.round(maxY/2), maxY];

  const grid = gridVals.map(v => `
    <line x1="${pad.l}" y1="${y(v)}" x2="${W-pad.r}" y2="${y(v)}" stroke="var(--line)"/>
    <text x="${pad.l-6}" y="${y(v)+4}" text-anchor="end" font-size="10" fill="var(--ink-faint)">${v}</text>`).join("");

  const pts = series.map((d, i) => [x(i), y(d.units_booked)]);
  const line = pts.map((p, i) => (i ? "L" : "M") + p[0] + " " + p[1]).join(" ");
  const dots = series.map((d, i) => `
    <circle cx="${x(i)}" cy="${y(d.units_booked)}" r="3.5" fill="var(--accent)"/>
    <text x="${x(i)}" y="${y(d.units_booked)-8}" text-anchor="middle" font-size="10" fill="var(--ink)">${d.units_booked}</text>`).join("");

  const xlabels = series.map((d, i) =>
    (i === 0 || i === n - 1 || n <= 3)
      ? `<text x="${x(i)}" y="${H-8}" text-anchor="middle" font-size="10" fill="var(--ink-faint)">${fmtDate(d.snapshot_date)}</text>` : "").join("");

  return `<svg viewBox="0 0 ${W} ${H}" width="100%" height="${H}" role="img" aria-label="Flats booked over time">
    ${grid}
    ${n > 1 ? `<path d="${line}" fill="none" stroke="var(--accent)" stroke-width="2"/>` : ""}
    ${dots}${xlabels}
  </svg>`;
}

/* ---------------- Project detail ---------------- */
async function renderProject(reg) {
  app.innerHTML = `<a class="back" href="#/">← All projects</a><div class="spinner">Loading…</div>`;
  let d, trend = [];
  try { d = await api("/api/projects/" + reg); }
  catch (e) { app.innerHTML = `<a class="back" href="#/">← All projects</a><div class="empty">Project not found.</div>`; return; }
  try { trend = await api("/api/trend?registration_no=" + encodeURIComponent(reg)); } catch (e) {}

  const p = d.project, pr = d.promoter, s = d.allottee_summary;
  const soldW = s.total ? (100*s.sold/s.total) : 0;
  const mortW = s.total ? (100*s.mortgage/s.total) : 0;
  const otherW = s.total ? (100*(s.total-s.sold-s.mortgage)/s.total) : 0;

  const checkItem = (i) => `<li>
      <span class="mark ${i.present?"yes":"no"}">${i.present?"✓":"·"}</span>
      <span>${esc(i.label)}</span>
      ${i.present && i.doc_url ? `<a class="doclink" href="${esc(i.doc_url)}" target="_blank" rel="noopener">view</a>` : ""}
    </li>`;

  const amenities = (d.common_areas && d.common_areas.amenities_json) || [];
  const apt = d.apartment_types || [];

  app.innerHTML = `
    <a class="back" href="#/">← All projects</a>
    <h1>${esc(p.project_name) || "Untitled project"}</h1>
    <div class="badges" style="margin-bottom:14px">
      ${p.district ? `<span class="badge">${esc(p.district)}</span>` : ""}
      ${p.project_type ? `<span class="badge gray">${esc(p.project_type)}</span>` : ""}
      ${p.project_category ? `<span class="badge gray">${esc(p.project_category)}</span>` : ""}
      ${p.status ? `<span class="badge ${statusClass(p.status)}">${esc(p.status)}</span>` : ""}
    </div>

    <div class="panel">
      <div class="facts">
        <div class="fact"><div class="l">Registration No</div><div class="v">${esc(p.registration_no)}</div></div>
        <div class="fact"><div class="l">Builder</div><div class="v"><a href="#/builder/${encodeURIComponent(p.promoter_name||"")}">${esc(p.promoter_name)||"—"}</a></div></div>
        <div class="fact"><div class="l">Registered on</div><div class="v">${fmtDate(p.date_of_registration)}</div></div>
        <div class="fact"><div class="l">Est. completion</div><div class="v">${fmtDate(p.expected_completion_date)}</div></div>
        <div class="fact"><div class="l">Land area</div><div class="v">${p.land_area ? esc(p.land_area)+" m²" : "—"}</div></div>
        <div class="fact"><div class="l">Address</div><div class="v">${esc(p.address)||"—"}</div></div>
      </div>
    </div>

    <div class="panel">
      <h2 style="margin-top:0">Inventory${s.total ? ` — ${s.sold_pct}% sold` : ""}</h2>
      ${s.total ? `
        <div class="bar">
          <div class="seg sold" style="width:${soldW}%"></div>
          <div class="seg mort" style="width:${mortW}%"></div>
          <div class="seg other" style="width:${otherW}%"></div>
        </div>
        <div class="legend">
          <span><span class="sw" style="background:var(--good)"></span>Sold ${num(s.sold)}</span>
          <span><span class="sw" style="background:var(--warn)"></span>Mortgage ${num(s.mortgage)}</span>
          <span><span class="sw" style="background:#cbd2d9"></span>Unsold/other ${num(s.total-s.sold-s.mortgage)}</span>
          <span class="faint">Total units ${num(s.total)}</span>
        </div>` : `<p class="faint" style="margin:0">No unit-level inventory recorded for this project.</p>`}
      ${apt.length ? `
        <h2>Apartment types</h2>
        <table><thead><tr><th>Type</th><th class="num">Carpet (m²)</th><th class="num">Total</th><th class="num">Sold</th><th class="num">Unsold</th></tr></thead>
        <tbody>${apt.map(a => `<tr>
          <td>${esc(a.type_name)}</td>
          <td class="num">${a.carpet_area_sqft ?? "—"}</td>
          <td class="num">${num(a.total_count)}</td>
          <td class="num">${num(a.sold_count)}</td>
          <td class="num">${num(a.unsold_count)}</td></tr>`).join("")}</tbody></table>` : ""}
    </div>

    ${trend.length ? `<div class="panel">
      <h2 style="margin-top:0">Flats booked over time</h2>
      ${trendChartSVG(trend)}
      <p class="faint" style="margin:8px 0 0;font-size:13px">
        ${trend.length === 1
          ? "Tracking just started — one snapshot so far. The trend line builds with each bi-weekly scrape."
          : `${trend.length} snapshots since ${fmtDate(trend[0].snapshot_date)}.`}
      </p>
    </div>` : ""}

    <div class="panel">
      <h2 style="margin-top:0">Document checklist</h2>
      <div class="facts">
        <div>
          <div class="l faint" style="font-size:12px;text-transform:uppercase;letter-spacing:.04em;margin-bottom:8px">Must-have</div>
          <ul class="checklist">${d.document_checklist.must_have.map(checkItem).join("")}</ul>
        </div>
        <div>
          <div class="l faint" style="font-size:12px;text-transform:uppercase;letter-spacing:.04em;margin-bottom:8px">Good-to-have</div>
          <ul class="checklist">${d.document_checklist.good_to_have.map(checkItem).join("")}</ul>
        </div>
      </div>
      <p class="faint" style="margin:14px 0 0;font-size:13px">${d.documents.length} document${d.documents.length!==1?"s":""} on record.</p>
    </div>

    ${amenities.length ? `<div class="panel">
      <h2 style="margin-top:0">Common areas & amenities</h2>
      <div class="chips">${amenities.map(a => {
        const name = typeof a === "string" ? a : (a.item || "");
        const charged = typeof a === "object" && a.charged;
        return `<span class="chip${charged?" charged":""}">${esc(name)}</span>`;
      }).join("")}</div>
    </div>` : ""}
  `;
}

/* ---------------- Builder ---------------- */
async function renderBuilder(name) {
  app.innerHTML = `<a class="back" href="#/">← All projects</a><div class="spinner">Loading…</div>`;
  let b;
  try { b = await api("/api/builders/" + encodeURIComponent(name)); }
  catch (e) { app.innerHTML = `<a class="back" href="#/">← All projects</a><div class="empty">Builder not found.</div>`; return; }

  const declared = b.declared_history || [];
  const declaredTotal = declared.length;
  const histStatusClass = (s) => {
    const t = (s||"").toLowerCase();
    if (t === "ongoing") return "good";
    if (t === "past") return "gray";
    return "warn";
  };
  const histRow = (h) => `<tr>
    <td>${h.in_db
          ? `<a href="#/project/${esc(h.registration_no)}">${esc(h.project_name)}</a>`
          : esc(h.project_name)}</td>
    <td class="reg">${esc(h.registration_no)||"—"}</td>
    <td><span class="badge ${histStatusClass(h.status)}">${esc(h.status)}</span></td>
    <td>${h.in_db ? `<span class="badge good">in Homelytics</span>` : `<span class="faint" style="font-size:12px">not yet scraped</span>`}</td>
  </tr>`;

  app.innerHTML = `
    <a class="back" href="#/">← All projects</a>
    <h1>${esc(b.name)}</h1>
    ${b.company_type ? `<div class="badges" style="margin-bottom:14px"><span class="badge gray">${esc(b.company_type)}</span></div>` : ""}

    <div class="stats">
      <div class="stat"><div class="n">${num(b.project_count)}</div><div class="l">In Homelytics</div></div>
      <div class="stat"><div class="n">${num(b.ongoing_count)}</div><div class="l">Declared ongoing</div></div>
      <div class="stat"><div class="n">${num(b.past_count)}</div><div class="l">Declared completed</div></div>
      <div class="stat"><div class="n">${num(b.total_complaints)}</div><div class="l">Complaints</div></div>
    </div>
    <p class="faint" style="margin:-6px 0 8px;font-size:13px">
      <b>In Homelytics</b> = projects we've scraped in detail (below). <b>Declared</b> counts come from
      the builder's own RERA project history — their full track record, only some of which we've scraped.
    </p>

    <h2>Projects in Homelytics <span class="faint" style="font-weight:400">(${b.projects.length})</span></h2>
    ${b.projects.length ? `<div class="grid">${b.projects.map(p => `
      <div class="card click" onclick="location.hash='#/project/${esc(p.registration_no)}'">
        <div><div class="title">${esc(p.project_name)||"Untitled"}</div><div class="reg">${esc(p.registration_no)}</div></div>
        <div class="badges">
          ${p.district?`<span class="badge">${esc(p.district)}</span>`:""}
          ${p.project_type?`<span class="badge gray">${esc(p.project_type)}</span>`:""}
          ${p.status?`<span class="badge ${statusClass(p.status)}">${esc(p.status)}</span>`:""}
        </div>
        <div class="kv"><span>Registered</span><b>${fmtDate(p.date_of_registration)}</b></div>
      </div>`).join("")}</div>` : `<p class="faint">None scraped yet.</p>`}

    ${declaredTotal ? `
    <h2>Declared project history <span class="faint" style="font-weight:400">(${declaredTotal})</span></h2>
    <p class="faint" style="margin:-6px 0 10px;font-size:13px">Self-reported by the builder on RERA — not all are in our database.</p>
    <div class="panel" style="padding:0;overflow:auto">
      <table>
        <thead><tr><th>Project</th><th>Registration No</th><th>Status</th><th>Coverage</th></tr></thead>
        <tbody>${declared.map(histRow).join("")}</tbody>
      </table>
    </div>` : ""}

    <div id="comp"></div>
  `;
  // complaints detail (best-effort)
  try {
    const cs = await api("/api/complaints?respondent=" + encodeURIComponent(name));
    const box = document.getElementById("comp");
    if (cs.length) {
      box.innerHTML = `<h2>Complaints (${cs.length})</h2>
        <div class="panel" style="padding:0;overflow:auto">
        <table><thead><tr><th>Complainant</th><th>Type</th><th>Status</th><th>Filed</th></tr></thead>
        <tbody>${cs.map(c => `<tr><td>${esc(c.complainant)}</td><td>${esc(c.complaint_type)}</td><td>${esc(c.status)}</td><td>${fmtDate(c.filed_date)}</td></tr>`).join("")}</tbody></table></div>`;
    }
  } catch (e) { /* ignore */ }
}

/* ---------------- Router ---------------- */
function route() {
  const h = location.hash || "#/";
  if (h.startsWith("#/project/")) return renderProject(h.slice("#/project/".length));
  if (h.startsWith("#/builder/")) return renderBuilder(decodeURIComponent(h.slice("#/builder/".length)));
  return renderHome();
}
window.addEventListener("hashchange", () => { window.scrollTo(0,0); route(); });
route();
</script>
</body>
</html>
